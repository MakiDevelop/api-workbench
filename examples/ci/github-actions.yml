# API Workbench — GitHub Actions CI Template
#
# Copy this file to your project at .github/workflows/api-tests.yml
# Requires: requests/ directory with API spec JSON files + .apiw/ project config
#
# This runs your API tests on every push and pull request.

name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Optional: run on a schedule (e.g. every 6 hours) to detect API drift
  # schedule:
  #   - cron: "0 */6 * * *"

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install API Workbench CLI
        run: |
          go install github.com/MakiDevelop/api-workbench/cmd/apiw@latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run API tests
        run: |
          apiw run --all --env ci --timeout 30s --snapshot

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-snapshots
          path: .apiw/snapshots/
          retention-days: 7
