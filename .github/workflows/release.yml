name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_path: src-tauri/target/release/bundle/dmg/*.dmg
            asset_name: API-Workbench-macOS-Apple-Silicon.dmg
          - os: macos-13
            target: x86_64-apple-darwin
            bundle_path: src-tauri/target/release/bundle/dmg/*.dmg
            asset_name: API-Workbench-macOS-Intel.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_path: src-tauri/target/release/bundle/nsis/*.exe
            asset_name: API-Workbench-Windows-x64-setup.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_path: src-tauri/target/release/bundle/deb/*.deb
            asset_name: API-Workbench-Linux-x64.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: ${{ matrix.bundle_path }}

  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: apiw-darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            asset_name: apiw-darwin-amd64
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            asset_name: apiw-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: apiw-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o ${{ matrix.asset_name }} ./cmd/apiw

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: [build-desktop, build-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/desktop-*/; do
            cp "$dir"* release-assets/ 2>/dev/null || true
          done
          for dir in artifacts/cli-*/; do
            cp "$dir"* release-assets/ 2>/dev/null || true
          done
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "$VERSION" release-assets/* \
            --title "$VERSION" \
            --generate-notes
