name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Build CLI
        run: go build -o bin/apiw ./cmd/apiw

      - name: Build sidecar
        run: go build -o bin/apiw-sidecar ./cmd/apiw-sidecar
